<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siren Article Banner</title>
  <style>
    :root {
      --bg: #060609;
      --surface: #0f0f18;
      --surface-2: #141421;
      --text: #f0f0f5;
      --muted: #8888a8;
      --accent: #00ff85;
      --accent-dim: rgba(0, 255, 133, 0.14);
      --border: rgba(240, 240, 245, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #030406;
      color: var(--text);
      font-family: system-ui, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 22px;
    }

    .page {
      width: fit-content;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(0, 255, 133, 0.24);
      background: linear-gradient(180deg, rgba(15,15,24,0.96), rgba(8,8,14,0.96));
      color: var(--text);
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 255, 133, 0.45);
      box-shadow: 0 8px 30px rgba(0, 255, 133, 0.1);
    }

    .button.primary {
      background: linear-gradient(180deg, rgba(0,255,133,0.14), rgba(0,255,133,0.08));
    }

    .hint {
      color: #8d8daa;
      font-size: 12px;
      letter-spacing: 0.04em;
      align-self: flex-end;
    }

    .frame {
      width: 1600px;
      height: 640px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.05);
      background: #060609 url('background.png') center / cover no-repeat;
    }

    svg {
      display: block;
    }
  </style>
</head>

  <script src="background-data.js"></script>
  <script>
    const svg = document.getElementById('bannerSvg');
    const frame = document.querySelector('.frame');
    const backgroundImage = document.getElementById('backgroundImage');
    const backgroundAssetPath = 'background.png';
    const embeddedBackgroundSource = window.SIREN_BACKGROUND_DATA_URL || null;
    let embeddedBackgroundDataUrl = null;

    function setBackgroundHref(href) {
      backgroundImage.setAttribute('href', href);
      backgroundImage.setAttributeNS('http://www.w3.org/1999/xlink', 'href', href);
    }

    let backgroundDataUrlPromise;

    function getBackgroundDataUrl() {
      if (embeddedBackgroundSource) {
        return Promise.resolve(embeddedBackgroundSource);
      }

      if (!backgroundDataUrlPromise) {
        backgroundDataUrlPromise = new Promise(function (resolve, reject) {
          function readBlobAsDataUrl(blob) {
            const reader = new FileReader();
            reader.onloadend = function () {
              if (typeof reader.result === 'string') {
                resolve(reader.result);
                return;
              }

              reject(new Error('background.png could not be converted to a data URL.'));
            };
            reader.onerror = function () {
              reject(new Error('background.png could not be read for export.'));
            };
            reader.readAsDataURL(blob);
          }

          // Prefer direct file-to-data conversion when the browser allows it.
          if (window.fetch) {
            fetch(backgroundAssetPath)
              .then(function (response) {
                if (!response.ok) {
                  throw new Error('background.png could not be fetched for export.');
                }

                return response.blob();
              })
              .then(readBlobAsDataUrl)
              .catch(function () {
                const img = new Image();
                img.onload = function () {
                  const canvas = document.createElement('canvas');
                  canvas.width = img.naturalWidth;
                  canvas.height = img.naturalHeight;
                  const ctx = canvas.getContext('2d');

                  if (!ctx) {
                    reject(new Error('Unable to create an export canvas for the background.'));
                    return;
                  }

                  ctx.drawImage(img, 0, 0);

                  try {
                    resolve(canvas.toDataURL('image/png'));
                  } catch (error) {
                    reject(error);
                  }
                };
                img.onerror = function () {
                  reject(new Error('background.png could not be loaded for export.'));
                };
                img.src = backgroundAssetPath;
              });
            return;
          }

          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');

            if (!ctx) {
              reject(new Error('Unable to create an export canvas for the background.'));
              return;
            }

            ctx.drawImage(img, 0, 0);

            try {
              resolve(canvas.toDataURL('image/png'));
            } catch (error) {
              reject(error);
            }
          };
          img.onerror = function () {
            reject(new Error('background.png could not be loaded for export.'));
          };
          img.src = backgroundAssetPath;
        });
      }

      return backgroundDataUrlPromise;
    }

    async function prepareSvgForExport() {
      try {
        embeddedBackgroundDataUrl = await getBackgroundDataUrl();
        setBackgroundHref(embeddedBackgroundDataUrl);
      } catch (error) {
        console.warn('Unable to inline background.png for export.', error);
      }
    }

    if (embeddedBackgroundSource) {
      frame.style.backgroundImage = "url('" + embeddedBackgroundSource + "')";
    }

    setBackgroundHref(embeddedBackgroundSource || backgroundAssetPath);
    prepareSvgForExport();

    function serializeSvg(options) {
      const settings = options || {};
      const includeBackgroundImage = settings.includeBackgroundImage !== false;
      const includeBackgroundFallback = settings.includeBackgroundFallback !== false;
      const clone = svg.cloneNode(true);
      const cloneBackgroundImage = clone.querySelector('#backgroundImage');
      const cloneBackgroundFallback = clone.querySelector('#backgroundFallback');

      if (cloneBackgroundImage) {
        if (includeBackgroundImage) {
          if (embeddedBackgroundDataUrl) {
            cloneBackgroundImage.setAttribute('href', embeddedBackgroundDataUrl);
            cloneBackgroundImage.setAttributeNS('http://www.w3.org/1999/xlink', 'href', embeddedBackgroundDataUrl);
          }
        } else {
          cloneBackgroundImage.remove();
        }
      }

      if (!includeBackgroundFallback && cloneBackgroundFallback) {
        cloneBackgroundFallback.remove();
      }

      return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    }

    function loadImage(src) {
      return new Promise(function (resolve, reject) {
        const img = new Image();
        img.onload = function () {
          resolve(img);
        };
        img.onerror = function () {
          reject(new Error('Image could not be loaded for export.'));
        };
        img.src = src;
      });
    }

    function drawCoverImage(ctx, img, targetWidth, targetHeight) {
      const sourceWidth = img.naturalWidth || img.width;
      const sourceHeight = img.naturalHeight || img.height;
      const sourceRatio = sourceWidth / sourceHeight;
      const targetRatio = targetWidth / targetHeight;
      let cropWidth = sourceWidth;
      let cropHeight = sourceHeight;
      let cropX = 0;
      let cropY = 0;

      if (sourceRatio > targetRatio) {
        cropWidth = sourceHeight * targetRatio;
        cropX = (sourceWidth - cropWidth) / 2;
      } else if (sourceRatio < targetRatio) {
        cropHeight = sourceWidth / targetRatio;
        cropY = (sourceHeight - cropHeight) / 2;
      }

      ctx.drawImage(
        img,
        cropX,
        cropY,
        cropWidth,
        cropHeight,
        0,
        0,
        targetWidth,
        targetHeight
      );
    }

    function triggerDownload(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1000);
    }

    document.getElementById('downloadSvg').addEventListener('click', async function () {
      await prepareSvgForExport();
      const svgBlob = new Blob([serializeSvg()], { type: 'image/svg+xml;charset=utf-8' });
      triggerDownload(svgBlob, 'siren-article-banner.svg');
    });

    document.getElementById('downloadPng').addEventListener('click', async function () {
      try {
        await prepareSvgForExport();
        const scale = 4;
        const canvas = document.createElement('canvas');
        canvas.width = 1600 * scale;
        canvas.height = 640 * scale;
        const ctx = canvas.getContext('2d');

        if (!ctx) {
          throw new Error('Canvas context is unavailable.');
        }

        ctx.fillStyle = '#060609';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const backgroundSrc = embeddedBackgroundSource || embeddedBackgroundDataUrl || backgroundAssetPath;
        const backgroundImg = await loadImage(backgroundSrc);
        drawCoverImage(ctx, backgroundImg, canvas.width, canvas.height);

        const overlaySvg = new Blob(
          [serializeSvg({ includeBackgroundImage: false, includeBackgroundFallback: false })],
          { type: 'image/svg+xml;charset=utf-8' }
        );
        const overlayUrl = URL.createObjectURL(overlaySvg);

        try {
          const overlayImg = await loadImage(overlayUrl);
          ctx.drawImage(overlayImg, 0, 0, canvas.width, canvas.height);
        } finally {
          URL.revokeObjectURL(overlayUrl);
        }

        canvas.toBlob(function (blob) {
          if (blob) {
            triggerDownload(blob, 'siren-article-banner-4x.png');
            return;
          }

          alert('PNG export failed. No image blob was produced.');
        }, 'image/png', 1);
      } catch (error) {
        console.error('PNG export failed.', error);
        alert('PNG export failed. The background image could not be embedded.');
      }
    });
  </script>
